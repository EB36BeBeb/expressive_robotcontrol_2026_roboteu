name: Python CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Linting & Test Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest black

    - name: Enforce Code Formatting (Black)
      run: |
        black --check tutorials/ tests/

    - name: Strict Linting (Flake8)
      run: |
        flake8 tutorials/ tests/ --count --max-complexity=15 --max-line-length=127 --statistics

    - name: Run Pytest
      run: |
        pytest tests/
