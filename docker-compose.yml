services:

  ros2:
    build: .
    container_name: groupwork_ros2
    # Keep terminal input/output active (interactive, tty)
    stdin_open: true
    tty: true
    # Mount current directory to /workspace inside the container
    volumes:
      - .:/workspace
    working_dir: /workspace
    # Automatically source ROS 2 environment and run bash shell upon container start
    command: /bin/bash -c "source /opt/ros/humble/setup.bash && exec /bin/bash"
    
    environment:
      - DISPLAY=host.docker.internal:0.0
      - LIBGL_ALWAYS_INDIRECT=0
      - QT_X11_NO_MITSHM=1
      - GAZEBO_MODEL_PATH=/workspace/models
      # ROS 2 DDS Configuration (for localhost communication within the same container)
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Expand shared memory for GUI and Simulation
    shm_size: '1gb'
