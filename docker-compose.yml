services:

  ros2:
    build: .
    container_name: groupwork_ros2
    # 터미널 입출력을 유지합니다 (interactive, tty)
    stdin_open: true
    tty: true
    # 현재 디렉토리를 컨테이너 안의 /workspace 에 마운트합니다.
    volumes:
      - .:/workspace
    working_dir: /workspace
    # 컨테이너 실행 시 자동으로 ROS 2 환경을 활성화하고 배시 쉘을 실행합니다.
    command: /bin/bash -c "source /opt/ros/humble/setup.bash && exec /bin/bash"
    
    environment:
      - DISPLAY=host.docker.internal:0.0
      - LIBGL_ALWAYS_INDIRECT=0
      - QT_X11_NO_MITSHM=1
      - GAZEBO_MODEL_PATH=/workspace/models
      # ROS 2 DDS 설정 (같은 컨테이너 내 localhost 통신용)
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # GUI 및 시뮬레이션을 위해 공유 메모리 확대
    shm_size: '1gb'
